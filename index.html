<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>观鸟雷达</title>
  <style>
    :root {
      --ink: #1c2b29; --muted: #60706c; --line: #dbe4df; --paper: #f7f8f4;
      --panel: #ffffff; --leaf: #2f6f5e; --leaf-dark: #18493e; --sky: #dff0f4;
      --sun: #f3b84a; --berry: #c95c4a; --shadow: 0 18px 42px rgba(32, 53, 48, .12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--paper); }
    button, input, select { font: inherit; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 360px minmax(0, 1fr); }
    aside { background: var(--panel); border-right: 1px solid var(--line); padding: 22px; overflow-y: auto; }
    main { display: grid; grid-template-rows: auto 1fr; min-width: 0; }
    .hero { min-height: 330px; padding: 32px; display: flex; align-items: flex-end; overflow: hidden; background: linear-gradient(90deg, rgba(19, 38, 33, .84), rgba(19, 38, 33, .2)), url("https://images.unsplash.com/photo-1508610048659-a06b669e3321?auto=format&fit=crop&w=1800&q=85") center 38% / cover; }
    .hero h1 { margin: 0; max-width: 820px; color: #fff; font-size: clamp(42px, 6vw, 78px); line-height: .96; letter-spacing: 0; }
    .hero p { max-width: 640px; margin: 16px 0 0; color: rgba(255, 255, 255, .86); font-size: 18px; line-height: 1.7; }
    .content { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr); gap: 20px; padding: 22px; min-width: 0; }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .mark { width: 44px; height: 44px; border-radius: 8px; display: grid; place-items: center; color: #fff; background: var(--leaf); box-shadow: 0 10px 24px rgba(47, 111, 94, .22); }
    .brand h2 { margin: 0; font-size: 20px; } .brand span { color: var(--muted); font-size: 13px; }
    .control { display: grid; gap: 8px; margin: 16px 0; }
    label { color: var(--muted); font-size: 13px; font-weight: 650; }
    input, select { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; color: var(--ink); background: #fff; outline: none; }
    input:focus, select:focus { border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(47, 111, 94, .14); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 18px; }
    .btn { border: 0; border-radius: 8px; padding: 12px 14px; cursor: pointer; color: #fff; background: var(--leaf); font-weight: 750; display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 46px; }
    .btn:hover { background: var(--leaf-dark); }
    .icon-btn { width: 46px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; display: grid; place-items: center; color: var(--leaf); }
    .hint, .status { margin: 14px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .status { min-height: 20px; color: var(--berry); }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 22px; }
    .stat { padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfa; }
    .stat strong { display: block; font-size: 23px; color: var(--leaf-dark); } .stat span { color: var(--muted); font-size: 12px; }
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 12px; }
    .section-title h3 { margin: 0; font-size: 19px; }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 7px 10px; color: var(--muted); background: #fff; font-size: 12px; white-space: nowrap; }
    .hotspots, .bird-list { display: grid; gap: 12px; }
    .spot { width: 100%; text-align: left; border: 1px solid var(--line); border-radius: 8px; padding: 16px; background: var(--panel); cursor: pointer; transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease; }
    .spot:hover, .spot.active { border-color: rgba(47, 111, 94, .45); box-shadow: var(--shadow); transform: translateY(-1px); }
    .spot-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .spot h4 { margin: 0; font-size: 17px; line-height: 1.3; }
    .score { flex: 0 0 auto; width: 52px; height: 52px; display: grid; place-items: center; border-radius: 8px; background: var(--sky); color: var(--leaf-dark); font-weight: 850; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; color: var(--muted); font-size: 13px; }
    .tag { display: inline-flex; border-radius: 999px; padding: 6px 9px; background: #f0f4ef; color: var(--muted); }
    .detail { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); min-width: 0; overflow: hidden; box-shadow: var(--shadow); }
    .detail-header { padding: 20px; background: linear-gradient(135deg, #edf6f2, #fff6df); border-bottom: 1px solid var(--line); }
    .detail-header h3 { margin: 0; font-size: 24px; line-height: 1.2; }
    .detail-header p { margin: 10px 0 0; color: var(--muted); line-height: 1.6; }
    .detail-body { padding: 18px; display: grid; gap: 18px; }
    .quick-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .quick { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfa; }
    .quick strong { display: block; font-size: 18px; color: var(--leaf-dark); } .quick span { color: var(--muted); font-size: 12px; }
    .bird { display: grid; grid-template-columns: 44px minmax(0, 1fr) auto; gap: 12px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .bird-dot { width: 44px; height: 44px; border-radius: 8px; display: grid; place-items: center; background: #ecf5f7; color: var(--leaf); }
    .bird strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .bird span { color: var(--muted); font-size: 12px; }
    .count { border-radius: 999px; padding: 6px 9px; background: #fff3dd; color: #805313; font-size: 12px; font-weight: 750; }
    .map { min-height: 260px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(135deg, rgba(223,240,244,.9), rgba(247,248,244,.92)), radial-gradient(circle at 20% 25%, rgba(47,111,94,.22), transparent 22%), radial-gradient(circle at 75% 42%, rgba(243,184,74,.28), transparent 20%), radial-gradient(circle at 46% 78%, rgba(201,92,74,.22), transparent 18%); position: relative; overflow: hidden; }
    .pin { position: absolute; width: 20px; height: 20px; border-radius: 50% 50% 50% 0; background: var(--leaf); transform: rotate(-45deg); box-shadow: 0 8px 16px rgba(24,73,62,.25); }
    .pin:after { content: ""; position: absolute; inset: 6px; border-radius: 999px; background: #fff; }
    .pin:nth-child(1) { left: 18%; top: 31%; } .pin:nth-child(2) { left: 67%; top: 25%; background: var(--sun); } .pin:nth-child(3) { left: 47%; top: 63%; background: var(--berry); } .pin:nth-child(4) { left: 79%; top: 70%; }
    @media (max-width: 980px) { .shell { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid var(--line); } .content { grid-template-columns: 1fr; } }
    @media (max-width: 640px) { aside, .content, .hero { padding: 18px; } .hero { min-height: 300px; } .row, .stats, .quick-grid { grid-template-columns: 1fr; } .bird { grid-template-columns: 38px minmax(0, 1fr); } .count { grid-column: 2; justify-self: start; } }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand"><div class="mark" aria-hidden="true"><svg width="25" height="25" viewBox="0 0 24 24" fill="none"><path d="M20 7.5c-4.2-.3-7.4 1.1-9.5 4.2-1.3 1.9-3.6 2.9-5.8 2.4 1.2 3.1 4.2 5 7.4 4.6 4.6-.6 7.7-4.6 7.9-11.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M7.7 14.6 4 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M15.7 8.5h.01" stroke="currentColor" stroke-width="2.7" stroke-linecap="round"/></svg></div><div><h2>观鸟雷达</h2><span>近期热点、鸟种和出行判断</span></div></div>
      <div class="control"><label for="city">常用区域</label><select id="city"><option value="shanghai">上海及周边</option><option value="hangzhou">杭州湾</option><option value="beijing">北京</option><option value="custom">自定义坐标</option></select></div>
      <div class="row"><div class="control"><label for="lat">纬度</label><input id="lat" inputmode="decimal" value="31.2304"></div><div class="control"><label for="lng">经度</label><input id="lng" inputmode="decimal" value="121.4737"></div></div>
      <div class="row"><div class="control"><label for="radius">半径</label><select id="radius"><option value="15">15 km</option><option value="30" selected>30 km</option><option value="50">50 km</option></select></div><div class="control"><label for="days">时间</label><select id="days"><option value="3">近 3 天</option><option value="7" selected>近 7 天</option><option value="14">近 14 天</option></select></div></div>
      <div class="control"><label for="token">eBird API Token</label><input id="token" type="password" placeholder="可选：输入后拉取实时观测"></div>
      <div class="actions"><button class="btn" id="refresh" type="button">更新地点</button><button class="icon-btn" id="locate" type="button" aria-label="使用当前位置" title="使用当前位置">◎</button></div>
      <p class="hint">实时模式使用 eBird 近况接口，按地点聚合近几天观测；示例模式展示产品形态和排序逻辑。</p><div class="status" id="status"></div>
      <div class="stats"><div class="stat"><strong id="stat-spots">0</strong><span>推荐地点</span></div><div class="stat"><strong id="stat-species">0</strong><span>记录鸟种</span></div><div class="stat"><strong id="stat-rare">0</strong><span>亮点记录</span></div></div>
    </aside>
    <main><section class="hero"><div><h1>近期去哪儿看鸟</h1><p>把最近观测、物种丰富度和通勤距离放在同一张工作台上，快速判断这个周末值得去哪里，以及那里大概率能看到什么。</p></div></section><section class="content"><div><div class="section-title"><h3>推荐地点</h3><span class="pill" id="mode-pill">示例数据</span></div><div class="hotspots" id="hotspots"></div></div><div class="detail" id="detail"></div></section></main>
  </div>
  <script>
    const cityPresets = { shanghai: { lat: 31.2304, lng: 121.4737 }, hangzhou: { lat: 30.2741, lng: 120.1551 }, beijing: { lat: 39.9042, lng: 116.4074 } };
    const sampleSpots = [
      { locId: "demo-nanhui", name: "南汇东滩湿地", distance: 47, score: 94, speciesCount: 86, checklistCount: 34, latest: "今天 07:40", habitat: "滩涂、芦苇、海堤", highlights: 4, note: "迁徙季水鸟和猛禽记录密集，清晨涨落潮窗口尤其值得看。", birds: [["黑脸琵鹭", "Black-faced Spoonbill", 6, true], ["大杓鹬", "Eurasian Curlew", 14, false], ["震旦鸦雀", "Reed Parrotbill", 9, true], ["红隼", "Common Kestrel", 2, false], ["白鹭", "Little Egret", 38, false]] },
      { locId: "demo-century", name: "世纪公园", distance: 9, score: 81, speciesCount: 42, checklistCount: 18, latest: "昨天 16:12", habitat: "城市湖泊、林地", highlights: 1, note: "交通方便，适合半日观察；林鸟、水鸟都有稳定记录。", birds: [["翠鸟", "Common Kingfisher", 3, false], ["棕背伯劳", "Long-tailed Shrike", 2, false], ["夜鹭", "Black-crowned Night Heron", 11, false], ["红胁蓝尾鸲", "Red-flanked Bluetail", 1, true], ["白头鹎", "Light-vented Bulbul", 27, false]] },
      { locId: "demo-gongqing", name: "共青森林公园", distance: 13, score: 76, speciesCount: 38, checklistCount: 13, latest: "近 2 天", habitat: "林地、草地、池塘", highlights: 1, note: "更适合找林鸟和鸫类，下午光线舒服，路线压力较小。", birds: [["乌鸫", "Chinese Blackbird", 18, false], ["灰喜鹊", "Azure-winged Magpie", 12, false], ["戴胜", "Eurasian Hoopoe", 1, true], ["珠颈斑鸠", "Spotted Dove", 21, false], ["暗绿绣眼鸟", "Swinhoe's White-eye", 16, false]] },
      { locId: "demo-wusong", name: "吴淞炮台湾湿地", distance: 21, score: 73, speciesCount: 44, checklistCount: 11, latest: "近 3 天", habitat: "滨江湿地、林缘", highlights: 2, note: "江边开阔，适合看鸻鹬和鸥类，也能兼顾林缘小鸟。", birds: [["普通鸬鹚", "Great Cormorant", 31, false], ["红嘴鸥", "Black-headed Gull", 44, false], ["矶鹬", "Common Sandpiper", 5, false], ["黑翅长脚鹬", "Black-winged Stilt", 7, true], ["灰椋鸟", "White-cheeked Starling", 19, false]] }
    ];
    const commonChineseNames = {
      "Black-faced Spoonbill": "黑脸琵鹭", "Eurasian Curlew": "大杓鹬", "Reed Parrotbill": "震旦鸦雀", "Common Kestrel": "红隼", "Little Egret": "白鹭",
      "Common Kingfisher": "翠鸟", "Long-tailed Shrike": "棕背伯劳", "Black-crowned Night Heron": "夜鹭", "Red-flanked Bluetail": "红胁蓝尾鸲", "Light-vented Bulbul": "白头鹎",
      "Chinese Blackbird": "乌鸫", "Azure-winged Magpie": "灰喜鹊", "Eurasian Hoopoe": "戴胜", "Spotted Dove": "珠颈斑鸠", "Swinhoe's White-eye": "暗绿绣眼鸟",
      "Great Cormorant": "普通鸬鹚", "Black-headed Gull": "红嘴鸥", "Common Sandpiper": "矶鹬", "Black-winged Stilt": "黑翅长脚鹬", "White-cheeked Starling": "灰椋鸟",
      "Mallard": "绿头鸭", "Eastern Spot-billed Duck": "斑嘴鸭", "Great Egret": "大白鹭", "Grey Heron": "苍鹭", "Chinese Pond Heron": "池鹭", "Little Grebe": "小䴙䴘",
      "Eurasian Coot": "白骨顶", "Common Moorhen": "黑水鸡", "Oriental Magpie": "喜鹊", "Eurasian Tree Sparrow": "树麻雀", "Barn Swallow": "家燕", "Pacific Swift": "白腰雨燕",
      "Brown Shrike": "红尾伯劳", "Yellow-bellied Tit": "黄腹山雀", "Japanese Tit": "大山雀", "Vinous-throated Parrotbill": "棕头鸦雀", "Daurian Redstart": "北红尾鸲"
    };
    function localizedBirdName(obs) {
      const common = obs.comName || "";
      const scientific = obs.sciName || "";
      const chinese = /[\u4e00-\u9fff]/.test(common) ? common : commonChineseNames[common] || common;
      const secondary = scientific && scientific !== chinese ? scientific : common !== chinese ? common : "";
      return { primary: chinese || scientific || "未识别鸟种", secondary };
    }
    const state = { spots: sampleSpots, activeId: sampleSpots[0].locId, live: false };
    const $ = (selector) => document.querySelector(selector);
    const els = { city: $("#city"), lat: $("#lat"), lng: $("#lng"), radius: $("#radius"), days: $("#days"), token: $("#token"), refresh: $("#refresh"), locate: $("#locate"), status: $("#status"), hotspots: $("#hotspots"), detail: $("#detail"), mode: $("#mode-pill"), statSpots: $("#stat-spots"), statSpecies: $("#stat-species"), statRare: $("#stat-rare") };
    function icon() { return `<svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M19.5 8.2c-3.9-.2-6.8 1.1-8.7 3.9-1.1 1.7-3.2 2.6-5.2 2.2 1.1 2.8 3.8 4.5 6.8 4.1 4.2-.5 7-4.2 7.1-10.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8.2 14.6 5 19.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`; }
    function render() { const active = state.spots.find((spot) => spot.locId === state.activeId) || state.spots[0]; els.hotspots.innerHTML = state.spots.map((spot) => `<button class="spot ${spot.locId === active.locId ? "active" : ""}" type="button" data-id="${spot.locId}"><div class="spot-top"><div><h4>${spot.name}</h4><div class="meta"><span class="tag">${spot.distance ? spot.distance + " km" : "附近"}</span><span class="tag">${spot.speciesCount} 种</span><span class="tag">${spot.latest}</span></div></div><div class="score">${spot.score}</div></div></button>`).join(""); els.detail.innerHTML = `<div class="detail-header"><h3>${active.name}</h3><p>${active.note}</p></div><div class="detail-body"><div class="quick-grid"><div class="quick"><strong>${active.speciesCount}</strong><span>近况鸟种</span></div><div class="quick"><strong>${active.checklistCount}</strong><span>观测记录</span></div><div class="quick"><strong>${active.highlights}</strong><span>亮点记录</span></div></div><div class="map"><i class="pin"></i><i class="pin"></i><i class="pin"></i><i class="pin"></i></div><div><div class="section-title"><h3>那里常见什么鸟</h3><span class="pill">${active.habitat}</span></div><div class="bird-list">${active.birds.map((bird) => `<div class="bird"><div class="bird-dot">${icon()}</div><div><strong>${bird[0]}</strong><span>${bird[1]}${bird[3] ? " · 亮点" : ""}</span></div><div class="count">${bird[2]} 只</div></div>`).join("")}</div></div></div>`; els.hotspots.querySelectorAll(".spot").forEach((button) => button.addEventListener("click", () => { state.activeId = button.dataset.id; render(); })); const species = new Set(state.spots.flatMap((spot) => spot.birds.map((bird) => bird[0]))); els.statSpots.textContent = state.spots.length; els.statSpecies.textContent = species.size; els.statRare.textContent = state.spots.reduce((sum, spot) => sum + spot.highlights, 0); els.mode.textContent = state.live ? "实时数据" : "示例数据"; }
    function scoreSpot(speciesCount, checklistCount, highlights) { return Math.min(99, Math.round(speciesCount * 1.4 + checklistCount * 1.8 + highlights * 8)); }
    function groupObservations(observations) { const grouped = new Map(); observations.forEach((obs) => { const id = obs.locId || obs.locName; if (!grouped.has(id)) grouped.set(id, { locId: id, name: obs.locName || "未命名地点", distance: null, species: new Map(), checklistCount: 0, latest: obs.obsDt || "近期", habitat: "eBird 观测地点", highlights: 0, note: "根据最近观测聚合得到，适合先看鸟种数、亮点记录和更新时间再决定路线。" }); const spot = grouped.get(id); spot.checklistCount += 1; if (obs.obsDt > spot.latest) spot.latest = obs.obsDt; if (obs.obsReviewed === false || obs.obsValid === false) spot.highlights += 1; const name = localizedBirdName(obs); const key = name.primary; const current = spot.species.get(key) || { zh: name.primary, en: name.secondary, count: 0, highlight: false }; const parsed = Number.parseInt(obs.howMany, 10); current.count += Number.isFinite(parsed) ? parsed : 1; current.highlight = current.highlight || obs.obsReviewed === false || obs.obsValid === false; spot.species.set(key, current); }); return Array.from(grouped.values()).map((spot) => { const birds = Array.from(spot.species.values()).sort((a, b) => b.count - a.count).slice(0, 8).map((bird) => [bird.zh, bird.en, bird.count, bird.highlight]); const speciesCount = spot.species.size; return { ...spot, birds, speciesCount, score: scoreSpot(speciesCount, spot.checklistCount, spot.highlights) }; }).sort((a, b) => b.score - a.score).slice(0, 8); }
    async function fetchLive() { const token = els.token.value.trim(); if (!token) { state.spots = sampleSpots; state.activeId = sampleSpots[0].locId; state.live = false; els.status.textContent = "当前为示例数据。输入 eBird API Token 后可获取实时近况。"; render(); return; } const lat = Number.parseFloat(els.lat.value); const lng = Number.parseFloat(els.lng.value); const dist = els.radius.value; const back = els.days.value; els.status.textContent = "正在读取近期观测..."; try { const url = `https://api.ebird.org/v2/data/obs/geo/recent?lat=${lat}&lng=${lng}&dist=${dist}&back=${back}&includeProvisional=true&sppLocale=zh`; const response = await fetch(url, { headers: { "X-eBirdApiToken": token } }); if (!response.ok) throw new Error(`eBird 返回 ${response.status}`); const spots = groupObservations(await response.json()); if (!spots.length) throw new Error("这个范围内暂时没有近期记录"); state.spots = spots; state.activeId = spots[0].locId; state.live = true; els.status.textContent = `已按近 ${back} 天观测更新，鸟种名优先显示中文。`; } catch (error) { state.spots = sampleSpots; state.activeId = sampleSpots[0].locId; state.live = false; els.status.textContent = `${error.message}。已切回示例数据。`; } render(); }
    els.city.addEventListener("change", () => { const preset = cityPresets[els.city.value]; if (preset) { els.lat.value = preset.lat; els.lng.value = preset.lng; } });
    els.refresh.addEventListener("click", fetchLive); els.locate.addEventListener("click", () => { if (!navigator.geolocation) { els.status.textContent = "当前浏览器不支持定位。"; return; } navigator.geolocation.getCurrentPosition((position) => { els.city.value = "custom"; els.lat.value = position.coords.latitude.toFixed(4); els.lng.value = position.coords.longitude.toFixed(4); els.status.textContent = "已填入当前位置。"; }, () => { els.status.textContent = "没有获得定位权限。"; }); }); render();
  </script>
</body>
</html>
